<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manajemen Daftar Undangan</title>
    <style>
        :root { 
            --bg: #f1f5f9; --header-table: #38bdf8;
            --c-smp: #fef08a; --t-smp: #854d0e;
            --c-smk: #bbf7d0; --t-smk: #166534;
            --c-kost: #1d4ed8; --t-kost: #ffffff;
            --c-kuliah: #e9d5ff; --t-kuliah: #6b21a8;
            --c-kerja: #fbcfe8; --t-kerja: #9d174d;
            --c-kel-pria: #bfdbfe; --t-kel-pria: #1e3a8a;
            --c-kel-wanita: #fecdd3; --t-kel-wanita: #881337;
            --c-tetangga: #99f6e4; --t-tetangga: #115e59;
            --c-sd: #fed7aa; --t-sd: #7c2d12;
            --c-bisnis: #cbd5e1; --t-bisnis: #334155;
            --c-vip: #fde047; --t-vip: #713f12;
            --c-lain: #f3f4f6; --t-lain: #374151;
            --c-online: #ef4444; --c-cetak: #60a5fa; --c-edit: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; color: #334155; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 18px; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }

        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #64748b; }
        input[type="text"], select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--header-table); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-add { width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.98); }
        .btn-cancel { width: 100%; padding: 12px; background: #94a3b8; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px; display: none; }

        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn-tool { flex: 1; min-width: 80px; padding: 10px; font-size: 11px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-tool.print { background: #64748b; }
        .btn-tool.excel { background: #10b981; }
        .btn-tool.backup { background: #3b82f6; }
        .btn-tool.restore { background: #8b5cf6; }

        .stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; background: #fff; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-val { font-size: 16px; font-weight: bold; display: block; }
        .stat-lbl { font-size: 10px; color: #64748b; text-transform: uppercase; }

        /* SPREADSHEET UPGRADES */
        .search-box { margin-bottom: 15px; }
        .search-box input { margin-bottom: 0; background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 12px center; padding-left: 35px; }
        
        /* Table Wrapper with Scroll & Sticky Header */
        .table-wrapper { background: white; border-radius: 8px; border: 1px solid #e2e8f0; overflow-x: auto; max-height: 450px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; font-size: 12px; }
        th { background: var(--header-table); color: white; padding: 12px 8px; text-align: left; border: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 10; cursor: pointer; user-select: none; transition: background 0.2s; }
        th:hover { background: #0284c7; }
        td { padding: 10px 8px; border: 1px solid #e2e8f0; vertical-align: middle; background: #fff; }

        /* Sort Indicator */
        .sort-icon { font-size: 10px; margin-left: 4px; opacity: 0.5; }
        th.active-sort .sort-icon { opacity: 1; color: #fef08a; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; display: inline-block; text-align: center; }
        .type-online { background: var(--c-online); color: white; }
        .type-cetak { background: var(--c-cetak); color: white; }
        
        .cat-smp { background: var(--c-smp); color: var(--t-smp); }
        .cat-smk { background: var(--c-smk); color: var(--t-smk); }
        .cat-kost { background: var(--c-kost); color: var(--t-kost); }
        .cat-kuliah { background: var(--c-kuliah); color: var(--t-kuliah); }
        .cat-kerja { background: var(--c-kerja); color: var(--t-kerja); }
        .cat-kel-pria { background: var(--c-kel-pria); color: var(--t-kel-pria); }
        .cat-kel-wanita { background: var(--c-kel-wanita); color: var(--t-kel-wanita); }
        .cat-tetangga { background: var(--c-tetangga); color: var(--t-tetangga); }
        .cat-sd { background: var(--c-sd); color: var(--t-sd); }
        .cat-bisnis { background: var(--c-bisnis); color: var(--t-bisnis); }
        .cat-vip { background: var(--c-vip); color: var(--t-vip); }
        .cat-lain { background: var(--c-lain); color: var(--t-lain); }

        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #0f172a; cursor: pointer; }
        .action-cell { display: flex; gap: 8px; justify-content: center; }
        .btn-icon { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; }
        .btn-del { color: #ef4444; font-weight: bold; }
        .btn-edit { color: var(--c-edit); }

        @media print {
            body { padding: 0; background: white; }
            .card, .toolbar, .stats, .search-box, .action-cell, th:last-child, td:last-child { display: none !important; }
            .table-wrapper { border: none; overflow: visible; max-height: none; }
            table { width: 100%; border: 1px solid #000; }
            th { background: #e2e8f0 !important; color: #000 !important; border: 1px solid #000; position: static; }
            td { border: 1px solid #000; }
            .badge { border: 1px solid #000; }
        }
    </style>
</head>
<body>

    <div class="card" id="form-card">
        <h2 id="form-title">Tambah Tamu Undangan</h2>
        <label>Nama Lengkap</label>
        <input type="text" id="u-nama" placeholder="Masukkan nama tamu...">
        
        <div class="grid">
            <div>
                <label>Media Undangan</label>
                <select id="u-tipe">
                    <option value="Online">Online</option>
                    <option value="Cetak">Cetak</option>
                </select>
            </div>
            <div>
                <label>Kategori</label>
                <select id="u-kategori">
                    <option value="Keluarga Pria">Keluarga Pria</option>
                    <option value="Keluarga Wanita">Keluarga Wanita</option>
                    <option value="Tetangga">Tetangga</option>
                    <option value="VIP">VIP</option>
                    <option value="Teman SD">Teman SD</option>
                    <option value="Teman SMP">Teman SMP</option>
                    <option value="Teman SMA/SMK">Teman SMA/SMK</option>
                    <option value="Teman Kuliah">Teman Kuliah</option>
                    <option value="Teman Kostan">Teman Kostan</option>
                    <option value="Teman Kerja">Teman Kerja</option>
                    <option value="Rekan Bisnis">Rekan Bisnis</option>
                    <option value="Lain-lain">Lain-lain</option>
                </select>
            </div>
        </div>
        <button id="btn-submit" class="btn-add" onclick="simpanData()">TAMBAH KE DAFTAR</button>
        <button id="btn-cancel" class="btn-cancel" onclick="batalEdit()">BATAL EDIT</button>
    </div>

    <div class="toolbar">
        <button class="btn-tool print" onclick="window.print()"><span>🖨️</span> Print / PDF</button>
        <button class="btn-tool excel" onclick="exportExcel()"><span>📊</span> Excel (CSV)</button>
        <button class="btn-tool backup" onclick="backupData()"><span>💾</span> Backup</button>
        <button class="btn-tool restore" onclick="document.getElementById('file-restore').click()"><span>📂</span> Restore</button>
        <input type="file" id="file-restore" accept=".json" style="display:none" onchange="restoreData(event)">
    </div>

    <div class="stats">
        <div class="stat-box"><span class="stat-val" id="count-total">0</span><span class="stat-lbl">Total</span></div>
        <div class="stat-box"><span class="stat-val" id="count-online">0</span><span class="stat-lbl">Online</span></div>
        <div class="stat-box"><span class="stat-val" id="count-cetak">0</span><span class="stat-lbl">Cetak</span></div>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Cari nama tamu atau kategori..." onkeyup="render()">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th width="40">Tr</th>
                    <th onclick="urutkanData('nama')" id="th-nama">Nama <span class="sort-icon">↕</span></th>
                    <th width="100" onclick="urutkanData('tipe')" id="th-tipe">Tipe <span class="sort-icon">↕</span></th>
                    <th width="80" onclick="urutkanData('undangan_ready')" id="th-undangan_ready">Undangan <span class="sort-icon">↕</span></th>
                    <th width="80" onclick="urutkanData('share_ready')" id="th-share_ready">Share <span class="sort-icon">↕</span></th>
                    <th width="120" onclick="urutkanData('kategori')" id="th-kategori">Kategori <span class="sort-icon">↕</span></th>
                    <th width="70">Opsi</th>
                </tr>
            </thead>
            <tbody id="list-tabel"></tbody>
        </table>
    </div>

<script>
    let db_undangan = JSON.parse(localStorage.getItem('undangan_v2')) || [];
    let idEditAktif = null; 
    let sortBy = ''; 
    let sortAsc = true;

    // SIMPAN & EDIT
    function simpanData() {
        const nama = document.getElementById('u-nama').value.trim();
        const tipe = document.getElementById('u-tipe').value;
        const kategori = document.getElementById('u-kategori').value;

        if(!nama) return alert("Nama tidak boleh kosong!");

        if (idEditAktif) {
            const idx = db_undangan.findIndex(x => x.id === idEditAktif);
            if(idx !== -1) {
                db_undangan[idx].nama = nama; db_undangan[idx].tipe = tipe; db_undangan[idx].kategori = kategori;
            }
            batalEdit(); 
        } else {
            db_undangan.push({ id: Date.now(), nama: nama, tipe: tipe, kategori: kategori, undangan_ready: false, share_ready: false });
            document.getElementById('u-nama').value = ""; 
        }
        save(); render();
    }

    function editData(id) {
        const tamu = db_undangan.find(x => x.id === id);
        if(!tamu) return;
        document.getElementById('u-nama').value = tamu.nama;
        document.getElementById('u-tipe').value = tamu.tipe;
        document.getElementById('u-kategori').value = tamu.kategori;
        idEditAktif = id;
        document.getElementById('form-title').innerText = "Edit Tamu Undangan";
        
        const btnSubmit = document.getElementById('btn-submit');
        btnSubmit.innerText = "💾 UPDATE DATA";
        btnSubmit.style.background = "var(--c-edit)";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function batalEdit() {
        idEditAktif = null;
        document.getElementById('u-nama').value = "";
        document.getElementById('form-title').innerText = "Tambah Tamu Undangan";
        const btnSubmit = document.getElementById('btn-submit');
        btnSubmit.innerText = "TAMBAH KE DAFTAR"; btnSubmit.style.background = "#0f172a";
        document.getElementById('btn-cancel').style.display = "none";
    }

    function toggleCheck(id, field) {
        const idx = db_undangan.findIndex(x => x.id === id);
        if(idx !== -1) { db_undangan[idx][field] = !db_undangan[idx][field]; save(); render(); }
    }

    function hapus(id) {
        if(confirm("Yakin ingin menghapus tamu ini?")) {
            db_undangan = db_undangan.filter(x => x.id !== id);
            if(id === idEditAktif) batalEdit(); 
            save(); render();
        }
    }

    function save() { localStorage.setItem('undangan_v2', JSON.stringify(db_undangan)); }

    // SORTING (Spreadsheet feature)
    function urutkanData(kolom) {
        if (sortBy === kolom) {
            sortAsc = !sortAsc; // Balik urutan jika klik kolom yang sama
        } else {
            sortBy = kolom;
            sortAsc = true; // Default A-Z
        }
        
        // Update Icon UI
        document.querySelectorAll('th').forEach(th => {
            th.classList.remove('active-sort');
            let icon = th.querySelector('.sort-icon');
            if(icon) icon.innerText = '↕';
        });
        
        const activeTh = document.getElementById('th-' + kolom);
        activeTh.classList.add('active-sort');
        activeTh.querySelector('.sort-icon').innerText = sortAsc ? '▲' : '▼';

        render();
    }

    // EXPORT & BACKUP
    function exportExcel() {
        let csvContent = "No,Nama Lengkap,Tipe,Status Undangan,Status Share,Kategori\n";
        db_undangan.forEach((u, index) => {
            let sU = u.undangan_ready ? "Selesai" : "Belum";
            let sS = u.share_ready ? "Selesai" : "Belum";
            csvContent += `${index + 1},"${u.nama}",${u.tipe},${sU},${sS},${u.kategori}\n`;
        });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
        link.download = "Daftar_Tamu_Undangan.csv"; link.click();
    }

    function backupData() {
        let link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([JSON.stringify(db_undangan, null, 2)], { type: 'application/json' }));
        link.download = `Backup_Undangan_${new Date().getTime()}.json`; link.click();
    }

    function restoreData(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const dataRestored = JSON.parse(e.target.result);
                if(Array.isArray(dataRestored) && confirm("Timpa data saat ini dengan file backup?")) {
                    db_undangan = dataRestored; save(); render(); alert("Data berhasil di-restore!");
                }
            } catch (err) { alert("Format file tidak sesuai!"); }
        };
        reader.readAsText(file); event.target.value = "";
    }

    // RENDER (WITH SEARCH & SORT)
    function render() {
        const tbody = document.getElementById('list-tabel');
        const keyword = document.getElementById('search-input').value.toLowerCase();
        
        let cTotal = db_undangan.length;
        let cOnline = 0; let cCetak = 0;

        // Hitung Stat Asli (Bukan dari hasil filter)
        db_undangan.forEach(u => { if(u.tipe === 'Online') cOnline++; else cCetak++; });
        document.getElementById('count-total').innerText = cTotal;
        document.getElementById('count-online').innerText = cOnline;
        document.getElementById('count-cetak').innerText = cCetak;

        // 1. Filter Data
        let dataTampil = db_undangan.filter(u => 
            u.nama.toLowerCase().includes(keyword) || 
            u.kategori.toLowerCase().includes(keyword)
        );

        // 2. Sort Data
        if (sortBy) {
            dataTampil.sort((a, b) => {
                let valA = typeof a[sortBy] === 'string' ? a[sortBy].toLowerCase() : a[sortBy];
                let valB = typeof b[sortBy] === 'string' ? b[sortBy].toLowerCase() : b[sortBy];
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        let html = "";
        dataTampil.forEach((u, i) => {
            let catClass = "cat-lain"; 
            switch(u.kategori) {
                case "Keluarga Pria": catClass = "cat-kel-pria"; break;
                case "Keluarga Wanita": catClass = "cat-kel-wanita"; break;
                case "Tetangga": catClass = "cat-tetangga"; break;
                case "VIP": catClass = "cat-vip"; break;
                case "Teman SD": catClass = "cat-sd"; break;
                case "Teman SMP": catClass = "cat-smp"; break;
                case "Teman SMA/SMK": catClass = "cat-smk"; break;
                case "Teman Kuliah": catClass = "cat-kuliah"; break;
                case "Teman Kostan": catClass = "cat-kost"; break;
                case "Teman Kerja": catClass = "cat-kerja"; break;
                case "Rekan Bisnis": catClass = "cat-bisnis"; break;
                case "Lain-lain": catClass = "cat-lain"; break;
                default: if(u.kategori === "Teman SMK") catClass = "cat-smk";
            }
            let typeClass = (u.tipe === "Online") ? "type-online" : "type-cetak";

            html += `
                <tr>
                    <td align="center">${i + 1}</td>
                    <td><b>${u.nama}</b></td>
                    <td align="center"><span class="badge ${typeClass}">${u.tipe}</span></td>
                    <td align="center"><input type="checkbox" ${u.undangan_ready ? 'checked' : ''} onchange="toggleCheck(${u.id}, 'undangan_ready')"></td>
                    <td align="center"><input type="checkbox" ${u.share_ready ? 'checked' : ''} onchange="toggleCheck(${u.id}, 'share_ready')"></td>
                    <td align="center"><span class="badge ${catClass}" style="width:100%">${u.kategori}</span></td>
                    <td align="center" class="action-cell">
                        <button class="btn-icon btn-edit" onclick="editData(${u.id})" title="Edit">✏️</button>
                        <button class="btn-icon btn-del" onclick="hapus(${u.id})" title="Hapus">✖</button>
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = html || `<tr><td colspan="7" align="center" style="padding:20px; color:#94a3b8;">${keyword ? 'Pencarian tidak ditemukan.' : 'Belum ada tamu undangan.'}</td></tr>`;
    }

    render();
</script>
</body>
</html>
